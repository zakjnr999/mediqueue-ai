version: 1
applications:
  - appRoot: apps/web/frontend
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 20 || nvm install 20
            - node -v
            - cd apps/web && npm ci
        build:
          commands:
            - cd apps/web/frontend && npm run build
      artifacts:
        baseDirectory: apps/web/frontend/.next
        files:
          - '**/*'
      cache:
        paths:
          - apps/web/node_modules/**/*
          - apps/web/frontend/.next/cache/**/*
    env:
      variables:
        # ── Server-side env var (never NEXT_PUBLIC_) ──
        # The proxy route uses this to forward requests to the backend.
        MEDIQUEUE_API_URL: https://p7xz21rbv0.execute-api.us-west-2.amazonaws.com/dev
        # ── Public env vars ──
        # The browser sends requests to "/api/*" (Next.js proxy), which
        # forwards to the real backend using MEDIQUEUE_API_URL above.
        NEXT_PUBLIC_MEDIQUEUE_API_URL: /api
        NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID: 662td5f2613fh0mtt8cra2dr1c
